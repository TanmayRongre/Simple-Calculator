<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator — Tanmay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="calc-card">
    <h1>Calculator<span class="dot">.</span></h1>

    <!-- INPUT FIELDS: The user types numbers here -->
    <div class="input-group">
      <label for="num1">First Number</label>
      <input type="number" id="num1" placeholder="e.g. 10">
    </div>

    <div class="input-group">
      <label for="num2">Second Number <span class="hint">(not needed for √, x², !, |x|, log, sin)</span></label>
      <input type="number" id="num2" placeholder="e.g. 5">
    </div>

    <!-- OPERATOR BUTTONS: Each calls calculate() with its own operator symbol -->
    <label>Choose an Operation</label>
    <div class="grid-operators">
      <button class="op-btn" onclick="calculate('+')">+</button>
      <button class="op-btn" onclick="calculate('-')">−</button>
      <button class="op-btn" onclick="calculate('*')">×</button>
      <button class="op-btn" onclick="calculate('/')">÷</button>
      <button class="op-btn" onclick="calculate('%')">%</button>
      <button class="op-btn" onclick="calculate('**')">xⁿ</button>
      <button class="op-btn" onclick="calculate('sqrt')">√</button>
      <button class="op-btn" onclick="calculate('sq')">x²</button>
      <button class="op-btn" onclick="calculate('fact')">n!</button>
      <button class="op-btn" onclick="calculate('abs')">|x|</button>
      <button class="op-btn" onclick="calculate('log')">log</button>
      <button class="op-btn" onclick="calculate('sin')">sin</button>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear 🧹</button>

    <!-- RESULT DISPLAY: JS writes the answer here -->
    <label>Result</label>
    <div class="result-box" id="resultBox">—</div>
  </div>

  <script src="script.js"></script>
</body>

</html>
